name: blink
description: "Blink - Lightweight Code Viewer"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: ^2.11.1
  flutter_riverpod: ^2.6.1
  google_fonts: ^6.2.1
  file_picker: ^8.1.7
  shared_preferences: ^2.5.3
  window_manager: ^0.5.1
  hotkey_manager: ^0.2.3
  collection: ^1.19.1
  freezed_annotation: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  freezed: ^3.2.5
  build_runner: ^2.11.1

flutter:
  uses-material-design: true
